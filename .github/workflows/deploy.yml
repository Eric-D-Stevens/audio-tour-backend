name: Deploy Backend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  migrate:
    name: Run Supabase Migrations
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: latest

    - name: Link Supabase project
      run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    - name: Push migrations
      run: supabase db push
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  build-and-deploy:
    needs: migrate
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set image tag from Git SHA
      run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Log in to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Check if image already exists in ECR
      run: |
        ECR_URI=$(aws ecr describe-repositories \
          --repository-names tensortours-lambda \
          --query 'repositories[0].repositoryUri' \
          --output text)
        echo "ECR_URI=${ECR_URI}" >> $GITHUB_ENV
        if aws ecr describe-images \
          --repository-name tensortours-lambda \
          --image-ids imageTag=${IMAGE_TAG} > /dev/null 2>&1; then
          echo "IMAGE_EXISTS=true" >> $GITHUB_ENV
          echo "Image ${IMAGE_TAG} already exists, skipping build."
        else
          echo "IMAGE_EXISTS=false" >> $GITHUB_ENV
          echo "Image ${IMAGE_TAG} not found, will build and push."
        fi

    - name: Build and push Docker image
      if: env.IMAGE_EXISTS == 'false'
      run: |
        docker build -t "${ECR_URI}:${IMAGE_TAG}" -t "${ECR_URI}:latest" .
        docker push "${ECR_URI}:${IMAGE_TAG}"
        docker push "${ECR_URI}:latest"

    - name: Trigger Infrastructure Deploy
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.WORKFLOW_PAT }}
        repository: ${{ github.repository_owner }}/audio-tour-infrastructure
        event-type: lambda-changed
        client-payload: |
          {
            "version": "${{ env.IMAGE_TAG }}",
            "image_tag": "${{ env.IMAGE_TAG }}"
          }
